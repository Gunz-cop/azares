<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Gradiente de fondo oscuro -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1b" />
      <stop offset="100%" stop-color="#05050a" />
    </linearGradient>
    <!-- Gradiente de borde neon/glow -->
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" />
      <stop offset="100%" stop-color="#b366ff" />
    </linearGradient>
    <!-- Filtro de brillo/glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fondo con esquinas redondeadas -->
  <rect width="100" height="100" rx="22" fill="url(#bg-grad)" />
  
  <!-- Borde neon sutil -->
  <rect x="2" y="2" width="96" height="96" rx="20" fill="none" stroke="url(#neon-grad)" stroke-width="2.5" opacity="0.8" />
  
  <!-- Círculo interior de brillo -->
  <circle cx="50" cy="50" r="32" fill="url(#neon-grad)" opacity="0.12" filter="url(#glow)" />
  
  <!-- Emoji en el centro -->
  <text x="50" y="65" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="44" text-anchor="middle">🎯</text>
</svg>
